{{/*
Generated passwords for bundled datastores. Stable across upgrades via lookup;
honors an explicit *.bundled.password when set. Consumed by both the bundled
StatefulSet and the app (kodus-common.dbEnv / rabbitmqEnv).
*/}}
{{- $ns := .Release.Namespace }}
{{- if eq .Values.postgres.mode "bundled" }}
{{- $n := printf "%s-postgres-secret" .Release.Name }}
{{- $e := (lookup "v1" "Secret" $ns $n) }}
{{- $pw := .Values.postgres.bundled.password }}
{{- if not $pw }}{{- if and $e $e.data (hasKey $e.data "password") }}{{- $pw = (index $e.data "password" | b64dec) }}{{- else }}{{- $pw = (randAlphaNum 24) }}{{- end }}{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $n }}
  labels:
    {{- include "kodus.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ $pw | quote }}
{{- end }}
