{{- if eq .Values.rabbitmq.mode "bundled" }}
{{- $b := .Values.rabbitmq.bundled }}
{{- $name := printf "%s-rabbitmq" .Release.Name }}
{{- /* Tell RabbitMQ how much memory it actually has (the pod limit), converted to
       RabbitMQ information units (Gi→GiB, …). The stock image sets
       vm_memory_high_watermark.relative and disk_free_limit.relative against the
       memory RabbitMQ *detects*, but in a container it detects the NODE's RAM, not
       the pod limit — so disk_free_limit balloons to ~1.2x host RAM and raises a
       permanent disk alarm that blocks every publisher (the whole review pipeline
       stalls), while the memory watermark rises far above the pod limit, risking an
       OOMKill before RabbitMQ ever throttles. Pinning the assumed memory fixes both. */}}
{{- $memLimit := "1Gi" }}
{{- if and $b.resources $b.resources.limits $b.resources.limits.memory }}{{- $memLimit = $b.resources.limits.memory | toString }}{{- end }}
{{- $rmqMem := $memLimit | replace "Gi" "GiB" | replace "Mi" "MiB" | replace "Ki" "KiB" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-conf
  labels:
    {{- include "kodus.labels" . | nindent 4 }}
data:
  20-kodus.conf: |
    # See the StatefulSet template header for why this override is required.
    total_memory_available_override_value = {{ $rmqMem }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "kodus.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5672
      targetPort: amqp
      name: amqp
  selector:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  labels:
    {{- include "kodus.labels" . | nindent 4 }}
spec:
  serviceName: {{ $name }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rabbitmq
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rabbitmq
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: kodus
    spec:
      automountServiceAccountToken: false   # DB doesn't call the k8s API
      securityContext:
        {{- include "kodus-common.datastorePodSecurityContext" . | nindent 8 }}
      initContainers:
        # fsGroup makes the kubelet add group rw to every file on the PVC at each
        # mount, turning the persisted .erlang.cookie into 0660. Erlang refuses to
        # start unless that cookie is 0600 ("accessible by owner only"), so the
        # broker crash-loops on any pod recreation. This runs AFTER the fsGroup
        # relabel and restores 0600 (no-op on first boot when the cookie doesn't
        # exist yet — RabbitMQ then creates it correctly). fsGroup is still needed
        # for initial PVC ownership by uid 999, so we keep it and fix the mode.
        - name: fix-cookie-perms
          image: {{ include "kodus-common.regPrefix" . }}busybox:1.37.0
          command: ["sh", "-c", "c=/var/lib/rabbitmq/.erlang.cookie; if [ -f \"$c\" ]; then chmod 600 \"$c\"; fi"]
          securityContext:
            runAsNonRoot: true
            {{- /* on openshift the SCC assigns the UID (same as the main container); pin 999 elsewhere */}}
            {{- if ne .Values.platform "openshift" }}
            runAsUser: 999            # same uid as rabbitmq, so it can chmod its own cookie
            {{- end }}
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { cpu: 50m, memory: 64Mi }
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
      containers:
        - name: rabbitmq
          image: {{ include "kodus-common.regPrefix" . }}{{ $b.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}
          # Pre-built Kodus image provisions the kodus-ai/kodus-ast vhosts on boot.
          command: ["/usr/local/bin/init-definitions.sh"]
          ports:
            - name: amqp
              containerPort: 5672
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: {{ $b.username | quote }}
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-secret
                  key: password
            - name: RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS
              value: "-rabbit heartbeat 60"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          # `rabbitmq-diagnostics` spawns an Erlang VM — too heavy/slow to sit in
          # the liveness hot path (the same cold-start trap that made mongosh
          # SIGKILL a healthy node). So: liveness = cheap tcpSocket on the AMQP
          # port (only restarts if the listener is truly gone); readiness = the
          # real `check_running` diagnostic (failing it just removes the pod from
          # the Service, never restarts); startupProbe absorbs Erlang + plugin +
          # vhost provisioning with retries instead of an inflated delay.
          startupProbe:
            tcpSocket:
              port: amqp
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 40        # up to ~3.5min for Erlang + plugins + vhosts
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "check_running"]
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: amqp
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml $b.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
            - name: kodus-conf
              # subPath mounts just this file INTO the image's conf.d, next to the
              # image's own 10-defaults.conf (a dir mount would hide it). conf.d
              # files load after rabbitmq.conf, so this override wins.
              mountPath: /etc/rabbitmq/conf.d/20-kodus.conf
              subPath: 20-kodus.conf
              readOnly: true
      volumes:
        - name: kodus-conf
          configMap:
            name: {{ $name }}-conf
  volumeClaimTemplates:
    # NOTE: volumeClaimTemplates is IMMUTABLE — adding fields here breaks
    # `helm upgrade` on an existing release. doctor-k8s.sh finds these PVCs by the
    # instance label the StatefulSet controller sets automatically.
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ $b.storage.size | default "8Gi" }}
        {{- with $b.storage.storageClass }}
        storageClassName: {{ . }}
        {{- end }}
{{- end }}
