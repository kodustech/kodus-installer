{{- if and (not .Values.global.existingSecret) (not .Values.global.externalSecrets.enabled) }}
{{- $ns := .Release.Namespace }}
{{- $name := printf "%s-secrets" .Release.Name }}
{{- $existing := (lookup "v1" "Secret" $ns $name) }}
{{- $prior := dict }}
{{- if and $existing $existing.data }}{{- $prior = $existing.data }}{{- end }}
{{- $inline := .Values.global.secrets }}
{{- $gen := .Values.global.autoGenerateSecrets }}
{{- $out := dict }}
{{/*
  hex32 keys — kodus-ai parses these with Buffer.from(x,'hex') and requires
  exactly 32 bytes, so the value MUST be 64 hex chars. sha256sum of a random
  string yields exactly that. Precedence: inline > existing (stable) > generated.
*/}}
{{- range $k := (list "API_CRYPTO_KEY" "CODE_MANAGEMENT_SECRET" "API_MCP_MANAGER_ENCRYPTION_SECRET") }}
  {{- $v := index $inline $k }}
  {{- if $v }}{{- $_ := set $out $k ($v | b64enc) }}
  {{- else if (hasKey $prior $k) }}{{- $_ := set $out $k (index $prior $k) }}
  {{- else if $gen }}{{- $_ := set $out $k (sha256sum (printf "%s-%s" $k (randAlphaNum 32)) | b64enc) }}
  {{- end }}
{{- end }}
{{/* base64 keys — JWT/NextAuth accept any high-entropy string. */}}
{{- range $k := (list "API_JWT_SECRET" "API_JWT_REFRESH_SECRET" "WEB_NEXTAUTH_SECRET" "API_MCP_MANAGER_JWT_SECRET" "CODE_MANAGEMENT_WEBHOOK_TOKEN") }}
  {{- $v := index $inline $k }}
  {{- if $v }}{{- $_ := set $out $k ($v | b64enc) }}
  {{- else if (hasKey $prior $k) }}{{- $_ := set $out $k (index $prior $k) }}
  {{- else if $gen }}{{- $_ := set $out $k (randAlphaNum 32 | b64enc | b64enc) }}
  {{- end }}
{{- end }}
{{/* NEXTAUTH_SECRET must mirror WEB_NEXTAUTH_SECRET (same value). */}}
{{- if hasKey $out "WEB_NEXTAUTH_SECRET" }}{{- $_ := set $out "NEXTAUTH_SECRET" (index $out "WEB_NEXTAUTH_SECRET") }}
{{- else if (index $inline "NEXTAUTH_SECRET") }}{{- $_ := set $out "NEXTAUTH_SECRET" ((index $inline "NEXTAUTH_SECRET") | b64enc) }}
{{- else if (hasKey $prior "NEXTAUTH_SECRET") }}{{- $_ := set $out "NEXTAUTH_SECRET" (index $prior "NEXTAUTH_SECRET") }}
{{- end }}
{{/* Optional inline-only secrets (LLM/MCP keys) — passthrough, never generated. */}}
{{- range $k := (list "API_OPEN_AI_API_KEY" "API_MORPHLLM_API_KEY" "API_E2B_KEY" "API_MCP_MANAGER_COMPOSIO_API_KEY") }}
  {{- $v := index $inline $k }}
  {{- if $v }}{{- $_ := set $out $k ($v | b64enc) }}
  {{- else if (hasKey $prior $k) }}{{- $_ := set $out $k (index $prior $k) }}{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "kodus.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $k, $v := $out }}
  {{ $k }}: {{ $v }}
  {{- end }}
{{- end }}
{{/*
External datastore credentials are provided by the user via
{postgres,mongodb,rabbitmq}.external.existingSecret (mode=external); operator
mode uses the operator-created secrets. This chart no longer mints DB secrets.
*/}}
