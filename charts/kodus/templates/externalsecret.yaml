{{- if .Values.global.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "kodus.fullname" . }}-secrets
  labels:
    {{- include "kodus.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.global.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ required "global.externalSecrets.store is required when externalSecrets.enabled" .Values.global.externalSecrets.store }}
    kind: {{ .Values.global.externalSecrets.storeKind | default "SecretStore" }}
  target:
    name: {{ printf "%s-secrets" .Release.Name }}
    creationPolicy: Owner
  data:
    {{- range $key := list "API_JWT_SECRET" "API_JWT_REFRESH_SECRET" "WEB_NEXTAUTH_SECRET" "NEXTAUTH_SECRET" "API_CRYPTO_KEY" "CODE_MANAGEMENT_SECRET" "CODE_MANAGEMENT_WEBHOOK_TOKEN" "API_OPEN_AI_API_KEY" "API_MORPHLLM_API_KEY" "API_E2B_KEY" "API_MCP_MANAGER_JWT_SECRET" "API_MCP_MANAGER_ENCRYPTION_SECRET" "API_MCP_MANAGER_COMPOSIO_API_KEY" }}
    - secretKey: {{ $key }}
      remoteRef:
        key: {{ printf "kodus/%s" $key }}
    {{- end }}
{{- end }}
