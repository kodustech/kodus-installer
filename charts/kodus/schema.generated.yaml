# Secret keys the app consumes.
secrets:
  required:
    - API_PG_DB_PASSWORD
    - API_MG_DB_PASSWORD
    - API_JWT_SECRET
    - API_JWT_REFRESH_SECRET
    - API_CRYPTO_KEY
    - CODE_MANAGEMENT_SECRET
    - WEB_NEXTAUTH_SECRET
    - NEXTAUTH_SECRET
  optional:
    - API_DOCS_BASIC_PASS
    - DATABASE_URL
    - API_PG_DB_URL
    - MONGODB_URI
    - API_MG_DB_URI
    - RABBITMQ_DEFAULT_PASS
    - API_RABBITMQ_URI
    - API_OPEN_AI_API_KEY
    - API_MORPHLLM_API_KEY
    - API_EXA_KEY
    - CODE_MANAGEMENT_WEBHOOK_TOKEN
    - LANGFUSE_SECRET_KEY
    - API_E2B_KEY
    - RESEND_API_KEY
    - API_SMTP_PASS
    - API_MCP_MANAGER_JWT_SECRET
    - API_MCP_MANAGER_ENCRYPTION_SECRET
  # Method to mint each secret unattended. hex32 MUST stay hex — the app
  # parses API_CRYPTO_KEY/CODE_MANAGEMENT_SECRET with Buffer.from(x,"hex").
  autogen:
    API_PG_DB_PASSWORD: hex32
    API_MG_DB_PASSWORD: hex32
    API_JWT_SECRET: base64-32
    API_JWT_REFRESH_SECRET: base64-32
    API_CRYPTO_KEY: hex32
    CODE_MANAGEMENT_SECRET: hex32
    CODE_MANAGEMENT_WEBHOOK_TOKEN: base64url-32
    WEB_NEXTAUTH_SECRET: mirror:NEXTAUTH_SECRET
    API_MCP_MANAGER_JWT_SECRET: base64-32
    API_MCP_MANAGER_ENCRYPTION_SECRET: hex32
    NEXTAUTH_SECRET: base64-32
